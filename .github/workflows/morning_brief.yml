name: Morning Brief

on:
  schedule:
    - cron: "30 12 * * 1-5"   # 5:30am PDT (UTC-7) / 4:30am PST — GH Actions can lag 30-60min, targets ~6:30am delivery
  workflow_dispatch:           # lets you trigger it manually from GitHub UI

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Morning Brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python morning_brief.py
