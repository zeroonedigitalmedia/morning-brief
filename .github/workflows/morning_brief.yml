name: Morning Brief

on:
  schedule:
    - cron: "17 8 * * 1-5"    # 1:17am PDT (UTC-7) / 12:17am PST — early off-peak UTC slot, targets pre-5am PT delivery even with typical 3-4hr GH Actions lag
  workflow_dispatch:           # lets you trigger it manually from GitHub UI

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Morning Brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python morning_brief.py
